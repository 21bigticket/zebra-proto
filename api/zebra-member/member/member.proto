syntax = "proto3";

import "google/protobuf/wrappers.proto";

package member;

option go_package = "./api/zebra-member/member;member";

// 用户信息
message Member {
  int64  user_id       = 1;
  string user_name     = 2;
  string password      = 3;
  string zb_lion       = 4;
  string nick_name     = 5;
  int32  member_status = 6; // 0=禁用, 1=启用
  string head_url      = 7;
  string phone         = 8;
  string email         = 9;
  int64  create_time   = 10;
  int64  update_time   = 11;
  int32  is_deleted    = 12;
}

// 创建用户请求
message CreateMemberRequest {
  string user_name     = 1;
  string password      = 2;
  string zb_lion       = 3;
  string nick_name     = 4;
  string head_url      = 5;
  string phone         = 6;
  string email         = 7;
}

// 更新用户请求
message UpdateMemberRequest {
  int64  user_id       = 1;
  string nick_name     = 2;
  string head_url      = 3;
  int32  member_status = 4;
}

// 删除用户请求
message DeleteMemberRequest {
  int64 user_id = 1;
}

// 获取用户请求
message GetMemberRequest {
  oneof query {
    int64  user_id   = 1;
    string user_name = 2;
    string phone     = 3;
  }
}

// 获取用户响应
message GetMemberResponse {
  google.protobuf.Int32Value  code = 1;  // 业务状态码: 0=成功, -1=失败, -2=数据为空
  string  msg = 2;  // 提示语
  Member member = 3;
}

// 列出用户请求
message ListMemberRequest {
  int32  page            = 1;
  int32  page_size       = 2;
  string name_keyword   = 3; // 名称模糊查询
  int32  member_status   = 4;  // 状态过滤，-1表示全部
}

// 列出用户响应
message ListMemberResponse {
  google.protobuf.Int32Value  code = 1;  // 业务状态码: 0=成功, -1=失败, -2=数据为空
  string  msg = 2;  // 提示语
  repeated Member members = 3;
  int32           total    = 4;
}

message MemberResponse {
  google.protobuf.Int32Value  code = 1;  // 业务状态码: 0=成功, -1=失败, -2=数据为空
  string  msg = 2;  // 提示语
}

// 用户端注册请求
message RegisterMemberRequest {
  string user_name       = 1;
  string password        = 2;
  string repeat_password = 3;
  string phone           = 4;
  string email           = 5;
  string nick_name       = 6;
  string verify_code     = 7;
}

// 用户端登录请求
message LoginMemberRequest {
  string account  = 1;
  string password = 2;
}

// 用户端最小用户信息
message MemberAuthUser {
  int64  user_id    = 1;
  string user_name  = 2;
  string nick_name  = 3;
  string head_url   = 4;
  string phone      = 5;
  string email      = 6;
}

// 用户端登录响应
message LoginMemberResponse {
  google.protobuf.Int32Value code = 1;
  string msg                     = 2;
  string token                   = 3;
  int64 expires_in               = 4;
  MemberAuthUser user_info       = 5;
}

// 用户端注册响应
message RegisterMemberResponse {
  google.protobuf.Int32Value code = 1;
  string msg                     = 2;
  MemberAuthUser user_info       = 3;
}

message SendVerifyCodeRequest {
  string mobile = 1;
  string biz_type = 2;
}

message SendVerifyCodeResponse {
  google.protobuf.Int32Value code = 1;
  string msg = 2;
  string message = 3;
}

message ChangeMobileRequest {
  int64 user_id = 1;
  string password = 2;
  string new_mobile = 3;
  string verify_code = 4;
}

message ResetPasswordRequest {
  string mobile = 1;
  string password = 2;
  string repeat_password = 3;
  string verify_code = 4;
}

message LogoutRequest {
  int64 user_id = 1;
}

message UpdateProfileRequest {
  optional string nick_name = 1;
  optional string email = 2;
  optional string phonenumber = 3;
  optional string sex = 4;
}

message UploadAvatarRequest {
  string file_name = 1;
}

message UploadAvatarResponse {
  google.protobuf.Int32Value code = 1;
  string msg = 2;
  string img_url = 3;
}

// 用户服务
service MemberService {
  rpc Create(CreateMemberRequest) returns (MemberResponse);
  rpc Update(UpdateMemberRequest) returns (MemberResponse);
  rpc Delete(DeleteMemberRequest) returns (MemberResponse);
  rpc Get(GetMemberRequest) returns (GetMemberResponse);
  rpc List(ListMemberRequest) returns (ListMemberResponse);
  rpc Register(RegisterMemberRequest) returns (RegisterMemberResponse);
  rpc Login(LoginMemberRequest) returns (LoginMemberResponse);
  rpc Logout(LogoutRequest) returns (MemberResponse);
  rpc UpdateProfile(UpdateProfileRequest) returns (MemberResponse);
  rpc UploadAvatar(UploadAvatarRequest) returns (UploadAvatarResponse);
  rpc SendVerifyCode(SendVerifyCodeRequest) returns (SendVerifyCodeResponse);
  rpc ChangeMobile(ChangeMobileRequest) returns (MemberResponse);
  rpc ResetPassword(ResetPasswordRequest) returns (MemberResponse);
}
