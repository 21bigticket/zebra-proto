syntax = "proto3";

import "google/protobuf/wrappers.proto";

package member;

option go_package = "./api/zebra-member/member;member";

// 用户搜索项（轻量，仅返回列表展示所需字段）
message MemberSearchItem {
  int64  user_id   = 1;
  string user_name = 2;
  string nick_name = 3;
  string phone     = 4;
}

// 按手机号模糊搜索请求
message SearchByPhoneRequest {
  string phone_keyword = 1; // 手机号关键字（模糊匹配）
  int32  page           = 2;
  int32  page_size      = 3;
}

// 按手机号模糊搜索响应
message SearchByPhoneResponse {
  google.protobuf.Int32Value     code = 1; // 0=成功, -1=失败, -2=数据为空
  string                         msg  = 2;
  repeated MemberSearchItem items     = 3;
  int32                     total    = 4;
}

// 用户搜索服务（后台管理辅助查询）
service MemberSearchService {
  rpc SearchByPhone(SearchByPhoneRequest) returns (SearchByPhoneResponse);
}
