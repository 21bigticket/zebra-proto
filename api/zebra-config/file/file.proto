syntax = "proto3";

import "google/protobuf/wrappers.proto";

package file;

option go_package = "./api/zebra-config/file;file";

message UploadFileRequest {
  string biz_type = 1;
  string file_name = 2;
  string content_type = 3;
  bytes file_data = 4;
}

message FileMeta {
  string file_id = 1;
  string url = 2;
  string relative_path = 3;
  string file_name = 4;
  string content_type = 5;
  int64 size = 6;
  int32 width = 7;
  int32 height = 8;
}

message UploadFileResponse {
  google.protobuf.Int32Value code = 1;
  string msg = 2;
  FileMeta data = 3;
}

service FileService {
  rpc Upload(UploadFileRequest) returns (UploadFileResponse);
}
