syntax = "proto3";

package zebra.stock.inner;

import "google/protobuf/wrappers.proto";

option go_package = "github.com/21bigticket/zebra-proto/api/zebra-stock/stock_inner;stockinnerpb";

// StockInnerService 库存内部查询服务（服务间调用专用）
// 注意：此服务仅供微服务内部调用，不对外暴露
service StockInnerService {
  // BatchGetStockNum 批量获取库存数量（无信息回填）
  rpc BatchGetStockNum(BatchGetStockNumRequest) returns (BatchGetStockNumResponse);
}

// BatchGetStockNumRequest 批量获取库存数量请求
message BatchGetStockNumRequest {
  repeated int64 sku_ids = 1; // SKU ID 列表
}

// StockNumItem 库存数量项
message StockNumItem {
  int64 sku_id = 1;      // SKU ID
  int32 stock_num = 2;   // 可用库存
  int32 freeze_num = 3;  // 冻结库存
}

// BatchGetStockNumResponse 批量获取库存数量响应
message BatchGetStockNumResponse {
  google.protobuf.Int32Value code = 1;          // 响应码
  string msg = 2;                                // 响应消息
  repeated StockNumItem stocks = 3;              // 库存数量列表
}
