syntax = "proto3";

import "google/protobuf/wrappers.proto";

package stock;

option go_package = "./api/zebra-stock/stock;stock";

// 库存信息
message Stock {
  int64  sku_id      = 1;  // SKU ID（商品最小单元唯一标识）
  int32  stock_num   = 2;  // 可用库存（可销售库存）
  int32  freeze_num  = 3;  // 冻结库存（订单未支付/发货锁定的库存）
  int32  sale_num    = 4;  // 累计已售数量（仅统计，不参与库存计算）
  int32  version     = 5;  // 乐观锁版本号（用于并发更新控制）
  int64  create_time = 6;  // 创建时间
  int64  update_time = 7;  // 更新时间
  int32  is_deleted  = 8;  // 是否删除: 0=否, 1=是
  int64  goods_id    = 9;  // 商品ID
  string goods_name  = 10; // 商品名称
  string sku_code    = 11; // SKU编码
  string sku_name    = 12; // SKU名称
}

// 入库请求
message InboundRequest {
  int64  sku_id    = 1;  // SKU ID
  int32  num       = 2;  // 入库数量
  string order_no  = 3;  // 订单号
  string remark    = 4;  // 备注
}

message BatchInboundItem {
  int64  sku_id    = 1;  // SKU ID
  int32  num       = 2;  // 入库数量
  string order_no  = 3;  // 订单号
  string remark    = 4;  // 备注
}

message BatchInboundRequest {
  repeated BatchInboundItem items = 1;  // 批量入库条目
}

// 出库请求
message OutboundRequest {
  int64  sku_id    = 1;  // SKU ID
  int32  num       = 2;  // 出库数量
  string order_no  = 3;  // 订单号
  string remark    = 4;  // 备注
}

message BatchOutboundItem {
  int64  sku_id    = 1;  // SKU ID
  int32  num       = 2;  // 出库数量
  string order_no  = 3;  // 订单号
  string remark    = 4;  // 备注
}

message BatchOutboundRequest {
  repeated BatchOutboundItem items = 1;  // 批量出库条目
}

// 冻结库存请求
message FreezeRequest {
  int64  sku_id    = 1;  // SKU ID
  int32  num       = 2;  // 冻结数量
  string order_no  = 3;  // 订单号
  string remark    = 4;  // 备注
}

message BatchFreezeItem {
  int64  sku_id    = 1;  // SKU ID
  int32  num       = 2;  // 冻结数量
  string order_no  = 3;  // 订单号
  string remark    = 4;  // 备注
}

message BatchFreezeRequest {
  repeated BatchFreezeItem items = 1;  // 批量冻结条目
}

// 释放库存请求
message ReleaseRequest {
  int64  sku_id    = 1;  // SKU ID
  int32  num       = 2;  // 释放数量
  string order_no  = 3;  // 订单号
  string remark    = 4;  // 备注
}

message BatchReleaseItem {
  int64  sku_id    = 1;  // SKU ID
  int32  num       = 2;  // 释放数量
  string order_no  = 3;  // 订单号
  string remark    = 4;  // 备注
}

message BatchReleaseRequest {
  repeated BatchReleaseItem items = 1;  // 批量释放条目
}

// 批量库存查询请求
message GetStockRequest {
  repeated int64 sku_ids = 1;  // SKU IDs
}

// 批量库存查询响应
message GetStockResponse {
  google.protobuf.Int32Value  code = 1;  // 业务状态码: 0=成功, -1=失败, -2=数据为空
  string  msg = 2;  // 提示语
  repeated Stock stocks = 3;  // 库存信息列表
}

// 库存分页查询请求
message ListStockRequest {
  int32 page = 1;       // 页码
  int32 page_size = 2;  // 页大小
  int64 sku_id = 3;     // SKU ID，0表示全部
  int64 goods_id = 4;   // 商品ID，0表示全部
}

// 库存分页查询响应
message ListStockResponse {
  google.protobuf.Int32Value code = 1;
  string msg = 2;
  repeated Stock stocks = 3;
  int32 total = 4;
}

// 归还已售库存请求（退款场景）
message ReturnSoldRequest {
  int64  sku_id    = 1;  // SKU ID
  int32  num       = 2;  // 归还数量
  string order_no  = 3;  // 订单号
  string remark    = 4;  // 备注
}

// 通用响应
message StockResponse {
  google.protobuf.Int32Value  code = 1;  // 业务状态码: 0=成功, -1=失败, -2=数据为空
  string  msg = 2;  // 提示语
  bool   success = 3;  // 是否成功
  string message = 4;  // 消息
  Stock  stock   = 5;  // 库存信息
}

// 库存服务
service StockService {
  // 入库
  rpc Inbound(InboundRequest) returns (StockResponse);
  // 批量入库
  rpc BatchInbound(BatchInboundRequest) returns (StockResponse);
  // 出库
  rpc Outbound(OutboundRequest) returns (StockResponse);
  // 批量出库
  rpc BatchOutbound(BatchOutboundRequest) returns (StockResponse);
  // 冻结库存
  rpc Freeze(FreezeRequest) returns (StockResponse);
  // 批量冻结库存
  rpc BatchFreeze(BatchFreezeRequest) returns (StockResponse);
  // 释放库存
  rpc Release(ReleaseRequest) returns (StockResponse);
  // 批量释放库存
  rpc BatchRelease(BatchReleaseRequest) returns (StockResponse);
  // 获取库存
  rpc GetStock(GetStockRequest) returns (GetStockResponse);
  // 分页查询库存
  rpc List(ListStockRequest) returns (ListStockResponse);
  // 归还已售库存（退款场景）
  rpc ReturnSold(ReturnSoldRequest) returns (StockResponse);
}
