syntax = "proto3";

import "google/protobuf/wrappers.proto";

package payment;

option go_package = "./api/zebra-pay/payment;payment";

// 支付记录
message Payment {
  int64  pay_id          = 1;
  string pay_no          = 2;
  string order_no        = 3;
  int64  user_id          = 4;
  int64  pay_amount      = 5;  // 支付金额（分）
  int32  pay_type        = 6;  // 1=支付宝, 2=微信, 3=余额
  int32  pay_status      = 7;  // 0=待支付, 1=支付成功, 2=支付失败, 3=已退款
  string third_party_no  = 8;  // 第三方支付流水号
  int64  pay_time        = 9;
  string notify_url     = 10;
  string return_url     = 11;
  int64  create_time     = 12;
  int64  update_time     = 13;
  int32  is_deleted      = 14;
}

// 退款记录
message Refund {
  int64  refund_id       = 1;
  string refund_no       = 2;
  string pay_no          = 3;
  string order_no        = 4;
  int64  refund_amount   = 5;  // 退款金额（分）
  int32  refund_status   = 6;  // 0=退款中, 1=退款成功, 2=退款失败
  string third_party_no  = 7;  // 第三方退款流水号
  int64  refund_time     = 8;
  string refund_reason   = 9;
  int64  create_time     = 10;
  int64  update_time     = 11;
  int32  is_deleted      = 12;
}

// 退款明细
message RefundItem {
  int64  item_id         = 1;
  int64  refund_id       = 2;
  string sales_no       = 3;  // 售后单号
  int64  refund_amount   = 4;  // 退款金额（分）
  int64  create_time     = 5;
  int64  update_time     = 6;
  int32  is_deleted      = 7;
}

// 创建支付请求
message CreatePaymentRequest {
  string order_no    = 1;
  int64  user_id      = 2;
  int64  pay_amount   = 3;
  int32  pay_type     = 4;
  string notify_url  = 5;
  string return_url  = 6;
}

// 创建支付响应
message CreatePaymentResponse {
  google.protobuf.Int32Value  code = 1;  // 业务状态码: 0=成功, -1=失败, -2=数据为空
  string  msg = 2;  // 提示语
  Payment payment     = 3;
  string  pay_url     = 4;  // 支付URL
  string  message     = 5;
}

// 支付回调请求
message PayCallbackRequest {
  string pay_no         = 1;
  string third_party_no = 2;
  int32  pay_status     = 3;
}

// 创建退款请求
message CreateRefundRequest {
  string       pay_no       = 1;
  string       sales_no     = 2;  // 售后单号
  int64        refund_amount = 3;
  string       refund_reason = 4;
  repeated RefundItemReq items = 5;
}

// 退款明细请求
message RefundItemReq {
  string sales_no     = 1;
  int64  refund_amount = 2;
}

// 创建退款响应
message CreateRefundResponse {
  google.protobuf.Int32Value  code = 1;  // 业务状态码: 0=成功, -1=失败, -2=数据为空
  string  msg = 2;  // 提示语
  Refund refund  = 3;
  string message = 4;
}

// 查询支付请求
message GetPaymentRequest {
  oneof query {
    string pay_no    = 1;
    string order_no  = 2;
  }
}

// 查询支付响应
message GetPaymentResponse {
  google.protobuf.Int32Value  code = 1;  // 业务状态码: 0=成功, -1=失败, -2=数据为空
  string  msg = 2;  // 提示语
  Payment payment = 3;
}

// 支付单分页查询请求
message ListPaymentRequest {
  int32 page = 1;
  int32 page_size = 2;
  int64 user_id = 3; // 用户ID，0表示全部
  string order_no = 4; // 订单号，空表示全部
  string pay_no = 5; // 支付单号，空表示全部
  int32 pay_type = 6; // 0表示全部
  int32 pay_status = 7; // -1表示全部
  int64 start_time = 8;
  int64 end_time = 9;
}

// 支付单分页查询响应
message ListPaymentResponse {
  google.protobuf.Int32Value code = 1;
  string msg = 2;
  repeated Payment payments = 3;
  int32 total = 4;
}

// 查询退款请求
message GetRefundRequest {
  oneof query {
    string refund_no = 1;
    string sales_no  = 2;
  }
}

// 查询退款响应
message GetRefundResponse {
  google.protobuf.Int32Value  code = 1;  // 业务状态码: 0=成功, -1=失败, -2=数据为空
  string  msg = 2;  // 提示语
  Refund                refund = 3;
  repeated RefundItem   items  = 4;
}

// 退款单分页查询请求
message ListRefundRequest {
  int32 page = 1;
  int32 page_size = 2;
  string pay_no = 3;
  string order_no = 4;
  string refund_no = 5;
  int32 refund_status = 6; // -1表示全部
  int64 start_time = 7;
  int64 end_time = 8;
}

// 退款单分页查询响应
message ListRefundResponse {
  google.protobuf.Int32Value code = 1;
  string msg = 2;
  repeated Refund refunds = 3;
  int32 total = 4;
}

// 支付日志记录
message PaymentLog {
  int64  log_id       = 1;
  string pay_no       = 2;  // 支付单号
  string order_no     = 3;  // 订单号
  string action       = 4;  // 操作: create=创建支付, pay=支付处理, refund=退款处理
  string request_data = 5;  // 请求数据(JSON)
  string response_data = 6; // 响应数据(JSON)
  int64  create_time  = 7;  // 创建时间
}

// 记录支付日志请求
message LogPaymentRequest {
  string pay_no       = 1;  // 支付单号
  string order_no     = 2;  // 订单号
  string action       = 3;  // 操作类型
  string request_data = 4;  // 请求数据
  string response_data = 5; // 响应数据
}

// 记录支付日志响应
message LogPaymentResponse {
  google.protobuf.Int32Value  code = 1;  // 业务状态码: 0=成功, -1=失败, -2=数据为空
  string  msg = 2;  // 提示语
  bool   success = 3;
  string message = 4;
  PaymentLog log = 5;
}

// 支付日志分页查询请求
message ListPaymentLogRequest {
  int32 page = 1;
  int32 page_size = 2;
  string pay_no = 3;
  string order_no = 4;
  string action = 5;
  int64 start_time = 6;
  int64 end_time = 7;
}

// 支付日志分页查询响应
message ListPaymentLogResponse {
  google.protobuf.Int32Value code = 1;
  string msg = 2;
  repeated PaymentLog logs = 3;
  int32 total = 4;
}

// 通用响应
message PaymentResponse {
  google.protobuf.Int32Value  code = 1;  // 业务状态码: 0=成功, -1=失败, -2=数据为空
  string  msg = 2;  // 提示语
  bool    success = 3;
  string  message = 4;
  Payment payment = 5;
}

// 支付服务
service PaymentService {
  rpc CreatePayment(CreatePaymentRequest) returns (CreatePaymentResponse);
  rpc PayCallback(PayCallbackRequest) returns (PaymentResponse);
  rpc CreateRefund(CreateRefundRequest) returns (CreateRefundResponse);
  rpc GetPayment(GetPaymentRequest) returns (GetPaymentResponse);
  rpc ListPayments(ListPaymentRequest) returns (ListPaymentResponse);
  rpc GetRefund(GetRefundRequest) returns (GetRefundResponse);
  rpc ListRefunds(ListRefundRequest) returns (ListRefundResponse);
  rpc LogPayment(LogPaymentRequest) returns (LogPaymentResponse);
  rpc ListPaymentLogs(ListPaymentLogRequest) returns (ListPaymentLogResponse);
}
