syntax = "proto3";

import "google/protobuf/wrappers.proto";

package cart;

option go_package = "./api/zebra-cart/cart;cart";

// 购物车
message Cart {
  int64  cart_id     = 1;
  int64  user_id     = 2;
  int64  create_time = 3;
  int64  update_time = 4;
  int32  is_deleted  = 5;
}

// 购物车商品
message CartItem {
  int64  item_id     = 1;
  int64  cart_id     = 2;
  int64  user_id     = 3;
  int64  sku_id      = 4;
  string sku_name    = 5;
  string sku_image   = 6;
  int64  price       = 7;  // 单价（分）
  int32  quantity    = 8;  // 数量
  int64  create_time = 9;
  int64  update_time = 10;
  int32  is_deleted  = 11;
}

// 添加商品请求
message AddItemRequest {
  int64  user_id  = 1;
  int64  sku_id   = 2;
  string sku_name = 3;
  string sku_image = 4;
  int64  price    = 5;
  int32  quantity = 6;
}

// 移除商品请求
message RemoveItemRequest {
  int64 user_id  = 1;
  int64 item_id  = 2;
}

// 更新数量请求
message UpdateQuantityRequest {
  int64 user_id  = 1;
  int64 item_id  = 2;
  int32 quantity = 3;
}

// 清空购物车请求
message ClearCartRequest {
  int64 user_id = 1;
}

// 获取购物车请求
message GetCartRequest {
  int64 user_id = 1;
}

// 获取购物车响应
message GetCartResponse {
  google.protobuf.Int32Value  code = 1;  // 业务状态码: 0=成功, -1=失败, -2=数据为空
  string  msg = 2;  // 提示语
  Cart           cart        = 3;
  repeated CartItem items    = 4;
}

// 批量删除请求
message BatchRemoveRequest {
  int64          user_id = 1;
  repeated int64 item_ids = 2;
}

message Response {
  google.protobuf.Int32Value  code = 1;  // 业务状态码: 0=成功, -1=失败, -2=数据为空
  string  msg = 2;  // 提示语
  bool       success  = 3;
  string     message  = 4;
  CartItem   item     = 5;
}

// 购物车服务
service CartService {
  rpc AddItem(AddItemRequest) returns (Response);
  rpc RemoveItem(RemoveItemRequest) returns (Response);
  rpc UpdateQuantity(UpdateQuantityRequest) returns (Response);
  rpc ClearCart(ClearCartRequest) returns (Response);
  rpc GetCart(GetCartRequest) returns (GetCartResponse);
  rpc BatchRemove(BatchRemoveRequest) returns (Response);
}
