syntax = "proto3";

import "google/protobuf/wrappers.proto";

package goods;

option go_package = "./api/zebra-goods/goods;goods";

// 商品(SPU)信息
message Goods {
  int64  id              = 1;
  int64  category_id     = 2;
  int64  vendor_id       = 3;
  int64  brand_id        = 4;
  string name            = 5;
  string sub_title       = 6;
  string main_image      = 7;
  string detail          = 8; // 富文本详情
  int32  sort_order      = 9;
  int32  status          = 10; // 0=下架, 1=上架
  int64  create_time     = 11;
  int64  update_time     = 12;
  int32  is_deleted      = 13;
  repeated string gallery_images = 14; // 商品图集
  repeated int64 attribute_template = 15; // 规格属性模板，存父属性ID
  string sku_name_rule = 16; // SKU自动命名规则
}

// 创建商品请求
message CreateGoodsRequest {
  int64  category_id = 1;
  int64  vendor_id   = 2;
  int64  brand_id    = 3;
  string name        = 4;
  string sub_title   = 5;
  string main_image  = 6;
  string detail      = 7;
  int32  sort_order  = 8;
  repeated string gallery_images = 9;
  repeated int64 attribute_template = 10;
  string sku_name_rule = 11;
}

// 更新商品请求
message UpdateGoodsRequest {
  int64  id          = 1;
  string name        = 2;
  string sub_title   = 3;
  string main_image  = 4;
  string detail      = 5;
  int32  sort_order  = 6;
  int32  status      = 7;
  repeated string gallery_images = 8;
  repeated int64 attribute_template = 9;
  string sku_name_rule = 10;
  int64 category_id = 11;
  int64 brand_id = 12;
  int64 vendor_id = 13;
}

// 删除商品请求
message DeleteGoodsRequest {
  int64 id = 1;
}

// 获取商品请求
message GetGoodsRequest {
  int64 id = 1;
}

// 获取商品响应
message GetGoodsResponse {
  google.protobuf.Int32Value  code = 1;  // 业务状态码: 0=成功, -1=失败, -2=数据为空
  string  msg = 2;  // 提示语
  Goods goods = 3;
}

// 列出商品请求
message ListGoodsRequest {
  int32  page         = 1;
  int32  page_size    = 2;
  int64  category_id  = 3; // -1表示全部
  int64  vendor_id    = 4; // -1表示全部
  int64  brand_id     = 5; // -1表示全部
  int32  status       = 6; // -1表示全部
  string name_keyword = 7;
}

// 列出商品响应
message ListGoodsResponse {
  google.protobuf.Int32Value  code = 1;  // 业务状态码: 0=成功, -1=失败, -2=数据为空
  string  msg = 2;  // 提示语
  repeated Goods goods = 3;
  int32         total = 4;
}

message Response {
  google.protobuf.Int32Value  code = 1;  // 业务状态码: 0=成功, -1=失败, -2=数据为空
  string  msg = 2;  // 提示语
}

// 商品服务
service GoodsService {
  rpc Create(CreateGoodsRequest) returns (Response);
  rpc Update(UpdateGoodsRequest) returns (Response);
  rpc Delete(DeleteGoodsRequest) returns (Response);
  rpc Get(GetGoodsRequest) returns (GetGoodsResponse);
  rpc List(ListGoodsRequest) returns (ListGoodsResponse);
}
