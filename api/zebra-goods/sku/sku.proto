syntax = "proto3";

import "google/protobuf/wrappers.proto";

package sku;

option go_package = "./api/zebra-goods/sku;sku";

// SKU信息
message GoodsSku {
  int64  id          = 1;
  int64  goods_id    = 2;
  string sku_code    = 3; // SKU编码
  string name        = 4; // SKU名称，如"红色-L"
  int64  price       = 5; // 价格(分)
  string image_url   = 6;
  google.protobuf.Int32Value sort_order = 7;
  google.protobuf.Int32Value status = 8; // 0=禁用, 1=启用
  int64  create_time = 9;
  int64  update_time = 10;
  int32  is_deleted  = 11;
  int32  stock_num   = 13; // 库存
  repeated int64 spec_ids = 14; // 关联的规格ID列表
}

// 创建SKU请求
message CreateSkuRequest {
  int64  goods_id   = 1;
  string sku_code   = 2;
  string name       = 3;
  int64  price      = 4;
  string image_url  = 5;
  google.protobuf.Int32Value sort_order = 6;
  repeated int64 spec_ids = 9; // 关联的规格ID列表
}

// 更新SKU请求
message UpdateSkuRequest {
  int64  id         = 1;
  string name       = 2;
  int64  price      = 3;
  string image_url  = 4;
  google.protobuf.Int32Value sort_order = 5;
  google.protobuf.Int32Value status = 6;
  string sku_code   = 7;
  int64  goods_id   = 8;
  repeated int64 spec_ids = 9; // 关联的规格ID列表
}

message BatchCreateSkuItem {
  int64  goods_id   = 1;
  string sku_code   = 2;
  string name       = 3;
  int64  price      = 4;
  string image_url  = 5;
  google.protobuf.Int32Value sort_order = 6;
  repeated int64 spec_ids = 9; // 关联的规格ID列表
}

message BatchCreateSkuRequest {
  repeated BatchCreateSkuItem items = 1;
}

message BatchUpdateSkuItem {
  int64  id         = 1;
  int64  price      = 2;
  google.protobuf.Int32Value sort_order = 4;
  google.protobuf.Int32Value status = 5;
}

message BatchUpdateSkuRequest {
  repeated BatchUpdateSkuItem items = 1;
}

// 删除SKU请求
message DeleteSkuRequest {
  int64 id = 1;
}

// 获取SKU请求
message GetSkuRequest {
  int64 id = 1;
}

// 获取SKU响应
message GetSkuResponse {
  google.protobuf.Int32Value  code = 1;  // 业务状态码: 0=成功, -1=失败, -2=数据为空
  string  msg = 2;  // 提示语
  GoodsSku sku = 3;
}

message MatchSkuBySpecsRequest {
  int64 goods_id = 1;
  repeated int64 spec_ids = 2;
}

message MatchSkuBySpecsResponse {
  google.protobuf.Int32Value code = 1;
  string msg = 2;
  GoodsSku sku = 3;
}

// 列出SKU请求
message ListSkuRequest {
  int32  page      = 1;
  int32  page_size = 2;
  int64  goods_id  = 3; // -1表示全部
  google.protobuf.Int32Value status = 4; // -1表示全部
}

// 列出SKU响应
message ListSkuResponse {
  google.protobuf.Int32Value  code = 1;  // 业务状态码: 0=成功, -1=失败, -2=数据为空
  string  msg = 2;  // 提示语
  repeated GoodsSku skus  = 3;
  int32          total = 4;
}

message Response {
  google.protobuf.Int32Value  code = 1;  // 业务状态码: 0=成功, -1=失败, -2=数据为空
  string  msg = 2;  // 提示语
}

// SKU服务
service SkuService {
  rpc Create(CreateSkuRequest) returns (Response);
  rpc BatchCreate(BatchCreateSkuRequest) returns (Response);
  rpc BatchUpdate(BatchUpdateSkuRequest) returns (Response);
  rpc Update(UpdateSkuRequest) returns (Response);
  rpc Delete(DeleteSkuRequest) returns (Response);
  rpc Get(GetSkuRequest) returns (GetSkuResponse);
  rpc List(ListSkuRequest) returns (ListSkuResponse);
  rpc ListSimple(ListSkuRequest) returns (ListSkuResponse);
  rpc MatchBySpecs(MatchSkuBySpecsRequest) returns (MatchSkuBySpecsResponse);
}
