syntax = "proto3";

import "google/protobuf/wrappers.proto";

package attribute;

option go_package = "./api/zebra-goods/attribute;attribute";

message GoodsAttribute {
  int64  id          = 1;
  int64  parent_id   = 2;
  string name        = 3;
  int32  type        = 4;
  int32  sort_order  = 5;
  int32  status      = 6;
  string description = 7;
  int64  create_time = 8;
  int64  update_time = 9;
  int32  is_deleted  = 10;
}

message CreateAttributeRequest {
  int64  parent_id  = 1;
  string name       = 2;
  int32  type       = 3;
  int32  sort_order = 4;
  string description = 5;
}

message UpdateAttributeRequest {
  int64  id         = 1;
  string name       = 2;
  int32  sort_order = 3;
  int32  status     = 4;
  string description = 5;
}

message DeleteAttributeRequest {
  int64 id = 1;
}

message GetAttributeRequest {
  int64 id = 1;
}

message GetAttributeResponse {
  google.protobuf.Int32Value  code = 1;
  string  msg = 2;
  GoodsAttribute attribute = 3;
}

message ListAttributeRequest {
  int32  page       = 1;
  int32  page_size  = 2;
  int64  parent_id  = 3;
  int32  type       = 4;
  int32  status     = 5;
}

message ListAttributeResponse {
  google.protobuf.Int32Value  code = 1;
  string  msg = 2;
  repeated GoodsAttribute attributes = 3;
  int32                   total      = 4;
}

message Response {
  google.protobuf.Int32Value  code = 1;
  string  msg = 2;
}

service AttributeService {
  rpc Create(CreateAttributeRequest) returns (Response);
  rpc Update(UpdateAttributeRequest) returns (Response);
  rpc Delete(DeleteAttributeRequest) returns (Response);
  rpc Get(GetAttributeRequest) returns (GetAttributeResponse);
  rpc List(ListAttributeRequest) returns (ListAttributeResponse);
}
