syntax = "proto3";

import "google/protobuf/wrappers.proto";

package order_refund;

option go_package = "./api/zebra-order/order_refund;order_refund";

// 订单退款请求
message RefundOrderRequest {
  string order_no      = 1;
  int64  user_id       = 2;
  string refund_amount = 3;   // 退款金额（元）
  string refund_reason = 4;   // 退款原因
  bool   return_stock  = 5;   // 是否归还库存
}

// 通用响应
message RefundOrderResponse {
  google.protobuf.Int32Value  code = 1;  // 业务状态码: 0=成功, -1=失败
  string  msg = 2;  // 提示语
  bool    success = 3;
  string  message = 4;
}

// 订单退款服务
service OrderRefundService {
  // 订单退款
  rpc RefundOrder(RefundOrderRequest) returns (RefundOrderResponse);
}
