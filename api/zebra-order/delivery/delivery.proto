syntax = "proto3";

import "google/protobuf/wrappers.proto";

package delivery;

option go_package = "./api/zebra-order/delivery;delivery";

// 订单发货信息
message Delivery {
  int64  delivery_id       = 1;  // 发货ID
  int64  order_id          = 2;  // 订单ID
  string order_no         = 3;  // 订单号
  string delivery_no      = 4;  // 物流单号
  string delivery_comp    = 5;  // 物流公司
  int32  delivery_status  = 6;  // 发货状态: 0=运输中, 1=已签收, 2=异常
  int64  create_time      = 7;
  int64  update_time      = 8;
  int32  is_deleted       = 9;
}

// 创建发货请求
message CreateDeliveryRequest {
  string order_no      = 1;  // 订单号
  string delivery_no   = 2;  // 物流单号
  string delivery_comp = 3;  // 物流公司
}

// 创建发货响应
message CreateDeliveryResponse {
  google.protobuf.Int32Value  code = 1;  // 业务状态码: 0=成功, -1=失败, -2=数据为空
  string  msg = 2;  // 提示语
  Delivery delivery = 3;
  string   message  = 4;
}

// 更新发货状态请求
message UpdateDeliveryStatusRequest {
  string order_no       = 1;  // 订单号
  int32  delivery_status = 2;  // 发货状态
}

// 查询发货信息请求
message GetDeliveryRequest {
  oneof query {
    string order_no    = 1;
    string delivery_no = 2;
    int64  delivery_id = 3;
  }
}

// 查询发货信息响应
message GetDeliveryResponse {
  google.protobuf.Int32Value  code = 1;  // 业务状态码: 0=成功, -1=失败, -2=数据为空
  string  msg = 2;  // 提示语
  Delivery delivery = 3;
}

// 发货分页查询请求
message ListDeliveryRequest {
  int32 page = 1;
  int32 page_size = 2;
  string order_no = 3;
  string delivery_no = 4;
  string delivery_comp = 5;
  int32 delivery_status = 6; // -1表示全部
  int64 start_time = 7;
  int64 end_time = 8;
}

// 发货分页查询响应
message ListDeliveryResponse {
  google.protobuf.Int32Value code = 1;
  string msg = 2;
  repeated Delivery deliveries = 3;
  int32 total = 4;
}

// 发货服务
service DeliveryService {
  rpc CreateDelivery(CreateDeliveryRequest) returns (CreateDeliveryResponse);
  rpc UpdateDeliveryStatus(UpdateDeliveryStatusRequest) returns (CreateDeliveryResponse);
  rpc GetDelivery(GetDeliveryRequest) returns (GetDeliveryResponse);
  rpc ListDeliveries(ListDeliveryRequest) returns (ListDeliveryResponse);
}
