syntax = "proto3";

import "google/protobuf/wrappers.proto";

package user_coupon;

option go_package = "./api/zebra-activity/user_coupon;user_coupon";

// 用户优惠券信息
message UserCoupon {
  int64  user_coupon_id = 1;
  int64  user_id        = 2;
  int64  coupon_id      = 3;
  string coupon_no      = 4;
  int32  coupon_status  = 5; // 0=未使用, 1=已使用, 2=已过期, 3=已预占
  int64  start_time     = 6;
  int64  end_time       = 7;
  int64  use_time       = 8;
  string order_no       = 9;
  int64  create_time    = 10;
  int64  update_time    = 11;
  int32  is_deleted     = 12;
}

message UserCouponLog {
  int64 log_id = 1;
  int64 user_coupon_id = 2;
  int64 user_id = 3;
  int64 coupon_id = 4;
  string action = 5;
  string order_no = 6;
  int32 before_status = 7;
  int32 after_status = 8;
  string result = 9;
  string message = 10;
  string request_data = 11;
  string response_data = 12;
  int64 create_time = 13;
}

// 领取优惠券请求
message ReceiveCouponRequest {
  int64 user_id   = 1;
  int64 coupon_id = 2;
}

// 领取优惠券响应
message ReceiveCouponResponse {
  google.protobuf.Int32Value  code = 1;  // 业务状态码: 0=成功, -1=失败, -2=数据为空
  string  msg = 2;  // 提示语
  UserCoupon user_coupon = 3;
  string    message      = 4;
}

// 预占优惠券请求
message ReserveCouponRequest {
  int64 user_coupon_id = 1;
  int64 user_id = 2;
  string order_no = 3;
  int64 order_amount = 4;
}

// 预占优惠券响应
message ReserveCouponResponse {
  google.protobuf.Int32Value code = 1;
  string msg = 2;
  UserCoupon user_coupon = 3;
  bool success = 4;
  string message = 5;
}

// 释放预占优惠券请求
message ReleaseCouponRequest {
  int64 user_coupon_id = 1;
  int64 user_id = 2;
  string order_no = 3;
}

// 释放预占优惠券响应
message ReleaseCouponResponse {
  google.protobuf.Int32Value code = 1;
  string msg = 2;
  UserCoupon user_coupon = 3;
  bool success = 4;
  string message = 5;
}

// 使用优惠券请求
message UseCouponRequest {
  int64  user_coupon_id = 1;
  int64  user_id        = 2;
  string order_no       = 3;
  int64  order_amount   = 4;
}

// 使用优惠券响应
message UseCouponResponse {
  google.protobuf.Int32Value  code = 1;  // 业务状态码: 0=成功, -1=失败, -2=数据为空
  string  msg = 2;  // 提示语
  UserCoupon user_coupon = 3;
  bool       success     = 4;
  string     message     = 5;
}

// 获取用户优惠券请求
message GetUserCouponRequest {
  int64 user_coupon_id = 1;
}

// 获取用户优惠券响应
message GetUserCouponResponse {
  google.protobuf.Int32Value  code = 1;  // 业务状态码: 0=成功, -1=失败, -2=数据为空
  string  msg = 2;  // 提示语
  UserCoupon user_coupon = 3;
}

// 列出用户优惠券请求
message ListUserCouponRequest {
  int64 user_id       = 1;
  int32 page          = 2;
  int32 page_size     = 3;
  int32 coupon_status = 4; // -1表示全部
}

// 列出用户优惠券响应
message ListUserCouponResponse {
  google.protobuf.Int32Value  code = 1;  // 业务状态码: 0=成功, -1=失败, -2=数据为空
  string  msg = 2;  // 提示语
  repeated UserCoupon user_coupons = 3;
  int32              total        = 4;
}

// 查询可用优惠券请求（下单时）
message GetAvailableCouponsRequest {
  int64 user_id     = 1;
  int64 order_amount = 2; // 订单金额（分）
}

// 查询可用优惠券响应
message GetAvailableCouponsResponse {
  google.protobuf.Int32Value  code = 1;  // 业务状态码: 0=成功, -1=失败, -2=数据为空
  string  msg = 2;  // 提示语
  repeated UserCoupon user_coupons = 3;
}

// 计算优惠金额请求
message CalculateDiscountRequest {
  int64 user_coupon_id = 1;
  int64 user_id = 2;
  int64 order_amount = 3;
}

// 计算优惠金额响应
message CalculateDiscountResponse {
  google.protobuf.Int32Value code = 1;
  string msg = 2;
  int64 discount_amount = 3;
  int64 final_amount = 4;
  string message = 5;
}

message GetUserCouponLogRequest {
  int64 log_id = 1;
}

message GetUserCouponLogResponse {
  google.protobuf.Int32Value code = 1;
  string msg = 2;
  UserCouponLog user_coupon_log = 3;
}

message ListUserCouponLogRequest {
  int32 page = 1;
  int32 page_size = 2;
  int64 user_coupon_id = 3;
  int64 user_id = 4;
  int64 coupon_id = 5;
  string order_no = 6;
  string action = 7;
  string result = 8;
  int64 start_time = 9;
  int64 end_time = 10;
}

message ListUserCouponLogResponse {
  google.protobuf.Int32Value code = 1;
  string msg = 2;
  repeated UserCouponLog user_coupon_logs = 3;
  int32 total = 4;
}

// 用户优惠券服务
service UserCouponService {
  rpc Receive(ReceiveCouponRequest) returns (ReceiveCouponResponse);
  rpc Reserve(ReserveCouponRequest) returns (ReserveCouponResponse);
  rpc Release(ReleaseCouponRequest) returns (ReleaseCouponResponse);
  rpc Use(UseCouponRequest) returns (UseCouponResponse);
  rpc Get(GetUserCouponRequest) returns (GetUserCouponResponse);
  rpc List(ListUserCouponRequest) returns (ListUserCouponResponse);
  rpc GetAvailable(GetAvailableCouponsRequest) returns (GetAvailableCouponsResponse);
  rpc CalculateDiscount(CalculateDiscountRequest) returns (CalculateDiscountResponse);
  rpc GetLog(GetUserCouponLogRequest) returns (GetUserCouponLogResponse);
  rpc ListLogs(ListUserCouponLogRequest) returns (ListUserCouponLogResponse);
}
