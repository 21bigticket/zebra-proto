syntax = "proto3";

import "google/protobuf/wrappers.proto";

package coupon_goods;

option go_package = "./api/zebra-activity/coupon;coupon";

// 优惠券适用商品
message CouponGoods {
  int64  coupon_goods_id = 1;
  int64  coupon_id       = 2;
  int64  goods_id        = 3;
  string goods_name      = 4;  // 商品名称快照
  string pic_url         = 5;  // 商品图片快照
  google.protobuf.Int32Value sort_order = 6;
}

// 新增优惠券商品关联
message CreateCouponGoodsRequest {
  int64 coupon_id  = 1;
  int64 goods_id   = 2;
  google.protobuf.Int32Value sort_order = 3;
}

// 删除优惠券商品关联
message DeleteCouponGoodsRequest {
  int64 coupon_goods_id = 1;
}

// 列出优惠券关联商品
message ListCouponGoodsRequest {
  int64 coupon_id = 1;
}

// 列出优惠券关联商品响应
message ListCouponGoodsResponse {
  google.protobuf.Int32Value code = 1;
  string msg = 2;
  repeated CouponGoods goods = 3;
}

message CouponGoodsResponse {
  google.protobuf.Int32Value code = 1;
  string msg = 2;
}

// 优惠券适用商品服务（独立于 CouponService）
service CouponGoodsService {
  rpc CreateCouponGoods(CreateCouponGoodsRequest) returns (CouponGoodsResponse);
  rpc DeleteCouponGoods(DeleteCouponGoodsRequest) returns (CouponGoodsResponse);
  rpc ListCouponGoods(ListCouponGoodsRequest) returns (ListCouponGoodsResponse);
}
