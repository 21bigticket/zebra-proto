syntax = "proto3";

package dict_data;

import "google/protobuf/wrappers.proto";

option go_package = "./api/zebra-passport/dict_data;dict_data";

// 字典数据（对应 sys_dict_data 表）
message DictData {
  int64  dict_code   = 1;
  int32  dict_sort   = 2;
  string dict_label  = 3;
  string dict_value  = 4;
  string dict_type   = 5;
  string css_class   = 6;
  string list_class  = 7;
  string is_default  = 8; // 是否默认（Y是 N否）
  string status      = 9; // 状态（0正常 1停用）
  string create_by   = 10;
  int64  create_time = 11;
  string update_by   = 12;
  int64  update_time = 13;
  string remark      = 14;
}

// 列出字典数据请求
message ListDictDataRequest {
  int32  page      = 1;
  int32  page_size = 2;
  string dict_type = 3;
  string dict_label = 4;
  string status    = 5;
}

// 列出字典数据响应
message ListDictDataResponse {
  google.protobuf.Int32Value code = 1;  // 业务状态码: 0=成功, -1=失败, -2=数据为空
  string msg   = 2;
  repeated DictData dict_data = 3;
  int32  total = 4;
}

// 获取字典数据请求
message GetDictDataRequest {
  int64 dict_code = 1;
}

// 获取字典数据响应
message GetDictDataResponse {
  google.protobuf.Int32Value code = 1;  // 业务状态码: 0=成功, -1=失败, -2=数据为空
  string   msg       = 2;
  DictData dict_data = 3;
}

// 根据字典类型查询请求
message GetDictDataByTypeRequest {
  string dict_type = 1;
}

// 根据字典类型查询响应
message GetDictDataByTypeResponse {
  google.protobuf.Int32Value code = 1;  // 业务状态码: 0=成功, -1=失败, -2=数据为空
  string msg   = 2;
  repeated DictData dict_data = 3;
}

// 创建字典数据请求
message CreateDictDataRequest {
  int32  dict_sort  = 1;
  string dict_label = 2;
  string dict_value = 3;
  string dict_type  = 4;
  string css_class  = 5;
  string list_class = 6;
  string is_default = 7;
  string status     = 8;
  string remark     = 9;
}

// 更新字典数据请求
message UpdateDictDataRequest {
  int64  dict_code  = 1;
  optional int32  dict_sort  = 2;
  optional string dict_label = 3;
  optional string dict_value = 4;
  optional string dict_type  = 5;
  optional string css_class  = 6;
  optional string list_class = 7;
  optional string is_default = 8;
  optional string status     = 9;
  optional string remark     = 10;
}

// 删除字典数据请求
message DeleteDictDataRequest {
  repeated int64 dict_codes = 1;
}

message Response {
  google.protobuf.Int32Value code = 1;  // 业务状态码: 0=成功, -1=失败, -2=数据为空
  string msg  = 2;
}

// 字典数据服务
service DictDataService {
  rpc List(ListDictDataRequest) returns (ListDictDataResponse);
  rpc Get(GetDictDataRequest) returns (GetDictDataResponse);
  rpc GetByDictType(GetDictDataByTypeRequest) returns (GetDictDataByTypeResponse);
  rpc Create(CreateDictDataRequest) returns (Response);
  rpc Update(UpdateDictDataRequest) returns (Response);
  rpc Delete(DeleteDictDataRequest) returns (Response);
}
