syntax = "proto3";

import "google/protobuf/wrappers.proto";

package path;

option go_package = "./api/zebra-passport/path;path";

// API路径信息（同时支持菜单和资源）
message Path {
  int64  id          = 1;
  string path_name   = 2;
  string path_url    = 3;
  string method      = 4; // GET, POST, PUT, DELETE
  string description = 5;
  int32  status      = 6; // 0=禁用, 1=启用
  int64  create_time = 7;
  int64  update_time = 8;
  int32  is_deleted  = 9;

  // 菜单相关字段（新增）
  int32  type        = 10; // 1=菜单, 2=资源
  int64  parent_id   = 11; // 父级菜单ID
  int32  level       = 12; // 菜单级数: 0=一级, 1=二级
  int32  sort        = 13; // 排序
  string icon        = 14; // 前端图标class
  int32  hidden      = 15; // 是否隐藏: 0=显示, 1=隐藏
}

// 创建路径请求
message CreatePathRequest {
  string path_name   = 1;
  string path_url    = 2;
  string method      = 3;
  string description = 4;
  int32  type        = 5; // 1=菜单, 2=资源
  int64  parent_id   = 6; // 父级菜单ID
  int32  level       = 7; // 菜单级数
  int32  sort        = 8; // 排序
  string icon        = 9; // 前端图标
  int32  hidden      = 10; // 是否隐藏
}

// 更新路径请求
message UpdatePathRequest {
  int64  id          = 1;
  string path_name   = 2;
  string path_url    = 3;
  string method      = 4;
  string description = 5;
  int32  status      = 6;
  int32  type        = 7; // 1=菜单, 2=资源
  int64  parent_id   = 8; // 父级菜单ID
  int32  level       = 9; // 菜单级数
  int32  sort        = 10; // 排序
  string icon        = 11; // 前端图标
  int32  hidden      = 12; // 是否隐藏
}

// 删除路径请求
message DeletePathRequest {
  int64 id = 1;
}

// 获取路径请求
message GetPathRequest {
  int64 id = 1;
}

// 获取路径响应
message GetPathResponse {
  google.protobuf.Int32Value  code = 1;  // 业务状态码: 0=成功, -1=失败, -2=数据为空
  string  msg = 2;  // 提示语
  Path path = 3;
}

// 列出路径请求
message ListPathRequest {
  int32  page          = 1;
  int32  page_size     = 2;
  string name_keyword  = 3;
  string method        = 4;
  int32  status        = 5;
}

// 列出路径响应
message ListPathResponse {
  google.protobuf.Int32Value  code = 1;  // 业务状态码: 0=成功, -1=失败, -2=数据为空
  string  msg = 2;  // 提示语
  repeated Path paths = 3;
  int32        total = 4;
}

message Response {
  google.protobuf.Int32Value  code = 1;  // 业务状态码: 0=成功, -1=失败, -2=数据为空
  string  msg = 2;  // 提示语
}

// 路径服务
service PathService {
  rpc Create(CreatePathRequest) returns (Response);
  rpc Update(UpdatePathRequest) returns (Response);
  rpc Delete(DeletePathRequest) returns (Response);
  rpc Get(GetPathRequest) returns (GetPathResponse);
  rpc List(ListPathRequest) returns (ListPathResponse);
}
