syntax = "proto3";

package permission;

import "google/protobuf/wrappers.proto";

option go_package = "./api/zebra-passport/permission;permission";

// 权限检查请求
message HasPermissionRequest {
  int64  user_id = 1;
  string perms   = 2;  // 权限标识，如 system:user:list
}

// 权限检查响应
message HasPermissionResponse {
  google.protobuf.Int32Value code = 1;  // 业务状态码: 0=成功, -1=失败, -2=数据为空
  string msg   = 2;
  bool   has_permission = 3;
}

// 权限服务
service PermissionService {
  rpc HasPermission(HasPermissionRequest) returns (HasPermissionResponse);
}
