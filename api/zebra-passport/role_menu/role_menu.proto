syntax = "proto3";

package role_menu;

import "google/protobuf/wrappers.proto";

option go_package = "./api/zebra-passport/role_menu;role_menu";

// 分配菜单请求
message AllocMenuRequest {
  int64  role_id = 1;
  repeated int64 menu_ids = 2;
}

// 获取角色菜单列表请求
message GetRoleMenusRequest {
  int64  role_id = 1;
}

// 获取角色菜单列表响应
message GetRoleMenusResponse {
  google.protobuf.Int32Value code = 1;  // 业务状态码: 0=成功, -1=失败, -2=数据为空
  string msg   = 2;
  repeated int64 menu_ids = 3;
}

message Response {
  google.protobuf.Int32Value code = 1;  // 业务状态码: 0=成功, -1=失败, -2=数据为空
  string msg  = 2;
}

// 角色菜单服务
service RoleMenuService {
  rpc AllocMenu(AllocMenuRequest) returns (Response);
  rpc GetRoleMenus(GetRoleMenusRequest) returns (GetRoleMenusResponse);
}
