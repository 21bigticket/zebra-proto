syntax = "proto3";

package menu;

import "google/protobuf/wrappers.proto";

option go_package = "./api/zebra-passport/menu;menu";

// 菜单信息（对应 sys_menu 表）
message Menu {
  int64  menu_id     = 1;
  string menu_name   = 2;
  int64  parent_id   = 3;
  int32  order_num   = 4;
  string path        = 5;  // 路由地址
  string component   = 6;  // 组件路径
  string query       = 7;  // 路由参数
  string route_name  = 8;  // 路由名称
  int32  is_frame    = 9;  // 是否外链（0是 1否）
  int32  is_cache    = 10; // 是否缓存（0缓存 1不缓存）
  string menu_type   = 11; // 类型（M目录 C菜单 F按钮）
  string visible     = 12; // 显示状态（0显示 1隐藏）
  string status      = 13; // 菜单状态（0正常 1停用）
  string perms       = 14; // 权限标识
  string icon        = 15; // 菜单图标
  string create_by   = 16;
  int64  create_time = 17;
  string update_by   = 18;
  int64  update_time = 19;
  string remark      = 20;
  // 非数据库字段
  repeated Menu children = 21;
}

// 路由元信息（匹配 RuoYi getRouters 返回的 meta）
message MetaVo {
  string title    = 1;
  string icon     = 2;
  bool   no_cache = 3;
  string link     = 4;
}

// 路由视图（匹配 RuoYi getRouters 返回格式）
message RouterVo {
  string name         = 1;
  string path         = 2;
  bool   hidden       = 3;
  string redirect     = 4;
  string component    = 5;
  string query        = 6;
  bool   always_show  = 7;
  MetaVo meta         = 8;
  repeated RouterVo children = 9;
}

// 创建菜单请求
message CreateMenuRequest {
  string menu_name  = 1;
  int64  parent_id  = 2;
  int32  order_num  = 3;
  string path       = 4;
  string component  = 5;
  string query      = 6;
  string route_name = 7;
  int32  is_frame   = 8;
  int32  is_cache   = 9;
  string menu_type  = 10;
  string visible    = 11;
  string status     = 12;
  string perms      = 13;
  string icon       = 14;
  string remark     = 15;
}

// 更新菜单请求
message UpdateMenuRequest {
  int64  menu_id    = 1;
  optional string menu_name  = 2;
  optional int64  parent_id  = 3;
  optional int32  order_num  = 4;
  optional string path       = 5;
  optional string component  = 6;
  optional string query      = 7;
  optional string route_name = 8;
  optional int32  is_frame   = 9;
  optional int32  is_cache   = 10;
  optional string menu_type  = 11;
  optional string visible    = 12;
  optional string status     = 13;
  optional string perms      = 14;
  optional string icon       = 15;
  optional string remark     = 16;
}

// 删除菜单请求
message DeleteMenuRequest {
  int64 menu_id = 1;
}

// 获取菜单请求
message GetMenuRequest {
  int64 menu_id = 1;
}

// 获取菜单响应
message GetMenuResponse {
  google.protobuf.Int32Value code = 1;  // 业务状态码: 0=成功, -1=失败, -2=数据为空
  string msg   = 2;
  Menu   menu  = 3;
}

// 列出菜单请求
message ListMenuRequest {
  string menu_name  = 1;
  string status     = 2;
}

// 列出菜单响应
message ListMenuResponse {
  google.protobuf.Int32Value code = 1;  // 业务状态码: 0=成功, -1=失败, -2=数据为空
  string msg   = 2;
  repeated Menu menus = 3;
}

// 获取路由响应（匹配 RuoYi getRouters）
message GetRoutersResponse {
  google.protobuf.Int32Value code = 1;  // 业务状态码: 0=成功, -1=失败, -2=数据为空
  string msg   = 2;
  repeated RouterVo data = 3;
}

// 菜单树节点
message MenuTreeOption {
  int64  menu_id   = 1;
  string menu_name = 2;
  repeated MenuTreeOption children = 3;
}

// 菜单树下拉响应
message TreeSelectResponse {
  google.protobuf.Int32Value code = 1;  // 业务状态码: 0=成功, -1=失败, -2=数据为空
  string msg   = 2;
  repeated MenuTreeOption menus = 3;
}

// 角色菜单树下拉响应
message RoleMenuTreeSelectResponse {
  google.protobuf.Int32Value code = 1;  // 业务状态码: 0=成功, -1=失败, -2=数据为空
  string msg   = 2;
  repeated MenuTreeOption menus = 3;
  repeated int64 checked_keys = 4;
}

// 更新菜单排序请求
message UpdateMenuSortRequest {
  repeated MenuSortItem items = 1;
}

message MenuSortItem {
  int64 menu_id   = 1;
  int32 order_num = 2;
}

message Response {
  google.protobuf.Int32Value code = 1;  // 业务状态码: 0=成功, -1=失败, -2=数据为空
  string msg  = 2;
}

// 菜单服务
service MenuService {
  rpc Create(CreateMenuRequest) returns (Response);
  rpc Update(UpdateMenuRequest) returns (Response);
  rpc Delete(DeleteMenuRequest) returns (Response);
  rpc Get(GetMenuRequest) returns (GetMenuResponse);
  rpc List(ListMenuRequest) returns (ListMenuResponse);
  rpc GetRouters(GetMenuRequest) returns (GetRoutersResponse);
  rpc TreeSelect(GetMenuRequest) returns (TreeSelectResponse);
  rpc RoleMenuTreeSelect(GetMenuRequest) returns (RoleMenuTreeSelectResponse);
  rpc UpdateSort(UpdateMenuSortRequest) returns (Response);
}
