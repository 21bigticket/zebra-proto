syntax = "proto3";

package captcha;

import "google/protobuf/wrappers.proto";

option go_package = "./api/zebra-passport/captcha;captcha";

// 获取验证码请求（空请求）
message GetCaptchaRequest {
}

// 验证码响应
message CaptchaResponse {
  google.protobuf.Int32Value code = 1;  // 业务状态码: 0=成功, -1=失败
  string msg = 2;
  bool captcha_enabled = 3;  // 验证码开关
  string uuid = 4;           // 验证码唯一标识
  string img = 5;            // base64 编码的验证码图片
}

// 校验验证码请求
message CheckCaptchaRequest {
  string code = 1;
  string uuid = 2;
}

// 通用响应
message Response {
  google.protobuf.Int32Value code = 1;
  string msg = 2;
}

service CaptchaService {
  // 获取验证码图片
  rpc GetCaptcha(GetCaptchaRequest) returns (CaptchaResponse);
  // 校验验证码
  rpc CheckCaptcha(CheckCaptchaRequest) returns (Response);
}
