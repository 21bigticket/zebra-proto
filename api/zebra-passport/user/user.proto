syntax = "proto3";

import "google/protobuf/wrappers.proto";

package user;

option go_package = "./api/zebra-passport/user;user";

// 用户信息（对应 sys_user 表）
message User {
  int64  user_id        = 1;
  int64  dept_id        = 2;
  string user_name      = 3;
  string nick_name      = 4;
  string user_type      = 5;  // 用户类型（00系统用户）
  string email          = 6;
  string phonenumber    = 7;
  string sex            = 8;  // 性别（0男 1女 2未知）
  string avatar         = 9;
  string password       = 10;
  string status         = 11; // 状态（0正常 1停用）
  string del_flag       = 12; // 删除标志（0存在 2删除）
  string login_ip       = 13;
  int64  login_date     = 14;
  int64  pwd_update_date = 15;
  string create_by      = 16;
  int64  create_time    = 17;
  string update_by      = 18;
  int64  update_time    = 19;
  string remark         = 20;
  // 非数据库字段，关联查询
  string dept_name      = 21;
  repeated int64 role_ids = 22;
  repeated int64 post_ids = 23;
}

// 获取用户详情请求（共享消息，被 user_auth、user_profile 引用）
message GetUserRequest {
  int64 user_id = 1;
}

// 创建用户请求
message CreateUserRequest {
  int64  dept_id     = 1;
  string user_name   = 2;
  string nick_name   = 3;
  string password    = 4;
  string email       = 5;
  string phonenumber = 6;
  string sex         = 7;
  string status      = 8;
  string remark      = 9;
  repeated int64 role_ids = 10;
  repeated int64 post_ids = 11;
}

// 更新用户请求（optional 字段表示可部分更新）
message UpdateUserRequest {
  int64  user_id     = 1;  // 必填
  optional int64  dept_id     = 2;
  optional string nick_name   = 3;
  optional string email       = 4;
  optional string phonenumber = 5;
  optional string sex         = 6;
  optional string status      = 7;
  optional string remark      = 8;
  repeated int64 role_ids = 9;
  repeated int64 post_ids = 10;
}

// 删除用户请求
message DeleteUserRequest {
  repeated int64 user_ids = 1;
}

// 获取用户详情响应
message GetUserResponse {
  google.protobuf.Int32Value code = 1;
  string msg        = 2;
  User   user       = 3;
  repeated int64 role_ids = 4;
  repeated int64 post_ids = 5;
  repeated RoleInfo roles = 6;
  repeated PostInfo posts = 7;
}

// 角色简要信息
message RoleInfo {
  int64  role_id   = 1;
  string role_name = 2;
  string role_key  = 3;
}

// 岗位简要信息
message PostInfo {
  int64  post_id   = 1;
  string post_code = 2;
  string post_name = 3;
}

// 列出用户请求
message ListUserRequest {
  int32  page          = 1;
  int32  page_size     = 2;
  string user_name     = 3;
  string phonenumber   = 4;
  string status        = 5;
  int64  dept_id       = 6;
  string begin_time    = 7;
  string end_time      = 8;
}

// 列出用户响应
message ListUserResponse {
  google.protobuf.Int32Value code = 1;
  string msg   = 2;
  repeated User users = 3;
  int32  total = 4;
}

// 重置密码请求
message ResetPwdRequest {
  int64  user_id  = 1;
  string password = 2;
}

// 修改用户状态请求
message ChangeStatusRequest {
  int64  user_id = 1;
  string status  = 2;
}

message Response {
  google.protobuf.Int32Value code = 1;  // 业务状态码: 0=成功, -1=失败, -2=数据为空
  string msg  = 2;
}

// 用户管理服务（CRUD）
service UserService {
  rpc Create(CreateUserRequest) returns (Response);
  rpc Update(UpdateUserRequest) returns (Response);
  rpc Delete(DeleteUserRequest) returns (Response);
  rpc Get(GetUserRequest) returns (GetUserResponse);
  rpc List(ListUserRequest) returns (ListUserResponse);
  rpc ResetPwd(ResetPwdRequest) returns (Response);
  rpc ChangeStatus(ChangeStatusRequest) returns (Response);
}
